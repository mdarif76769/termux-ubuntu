name: Update Ubuntu RootFS

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

    
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      
      - name: Run update script
        run: python scripts/update_rootfs.py

    
      - name: Read updated version
        id: version
        run: |
          # install-ubuntu.sh 
          version=$(grep -oP '^(name|code_name|release)=\K[^"]+' install-ubuntu.sh | sed -E ':a;N;$!ba;s/\s|\n/-/g')
          echo "version=$version" >> $GITHUB_ENV

      
      - name: Check for changes
        run: |
          if git diff --quiet; then
            echo "create_pull_request=false" >> $GITHUB_ENV
          else
            echo "create_pull_request=true" >> $GITHUB_ENV
            echo "branch=auto-rootfs-update-${{ env.version }}" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: env.create_pull_request == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "RootFS auto-update to ${{ env.version }}"
          commit-message: "Updated RootFS to version ${{ env.version }}"
          body: "This is an automated update triggered by the system."
          branch: ${{ env.branch }}
          labels: automated,update
          delete-branch: true
